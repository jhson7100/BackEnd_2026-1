<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시판</title>
</head>
<body>

<h2 th:text="${boardName}">자유게시판</h2>

<div th:each="article : ${articles}">
    <h1 th:text="${article.title}">제목</h1>

    <p>
        <span th:text="${article.author}">회원</span>
        |
        <span th:text="${#temporals.format(article.date, 'yyyy-MM-dd')}">2024-05-14</span>
    </p>

    <p th:text="${article.content}">내용입니다!!</p>
</div>

</body>
</html>
